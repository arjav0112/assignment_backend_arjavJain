      .type { fill: #9b9b9b; font: 500 14px Consolas, monospace; }
      .legendText { fill: #f5f5f5; font: 500 14px Segoe UI, Arial, sans-serif; }
      .muted { fill: #c9c9c9; }
      .relation { fill: none; stroke: #bbbbbb; stroke-width: 3; stroke-dasharray: 12 10; }
    </style>
  </defs>

